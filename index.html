<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="image/icon.png" type="image/png">
    <title>cirtɔl</title>
</head>
<body>
    <img src="image/icon2.png" style="position:absolute;top:0;right:0;height:10vh;width:10vh">
    <div id="setting" style="display:flex">
        <p>SETTINGS : </p>
        <input id="offset" type="number" placeholder="offset(ms)" min="-500" max="500" style="margin:10px; width:15vw">
        <a href="about.html" style="position:absolute;right:8vw;margin:10px;font-size:1vw">about</a>
        <a href="story.html" style="position:absolute;right:5vw;margin:10px;font-size:1vw">story</a>
    </div>
    <div style="position:absolute;top:20vh;left:5vw;height:auto;width:80vw;padding:5vw;border:black solid 1vh;border-radius:5vh;">
        <div style="display:flex">
            <p>Canon in D Major</p><button id="Canon_in_D_Major_easy" style="margin:10px">E A S Y</button><button id="Canon_in_D_Major_medium" style="margin:10px">MEDIUM</button>
        </div>
        <div style="display:flex">
            <p>Sonata No. 11 in A major-III.</p><button id="z" style="margin:10px">H A R D</button>
        </div>
    </div>
    <script>
        const Canon_in_D_Major_easy=document.querySelector('#Canon_in_D_Major_easy');
        const Canon_in_D_Major_medium=document.querySelector('#Canon_in_D_Major_medium');
        const Sonata_No_11_in_A_major_III_hard=document.querySelector('#z'); 
        Canon_in_D_Major_easy.addEventListener('click',()=>{
            window.location.href=`game.html?offset=${document.getElementById('offset').value/1000}&music=Canon_in_D_Major&difficulty=easy`;
        })
        Canon_in_D_Major_medium.addEventListener('click',()=>{
            window.location.href=`game.html?offset=${document.getElementById('offset').value/1000}&music=Canon_in_D_Major&difficulty=medium`;
        })
        Sonata_No_11_in_A_major_III_hard.addEventListener('click',()=>{
            window.location.href=`game.html?offset=${document.getElementById('offset').value/1000}&music=Sonata_No._11_in_A_major-III&difficulty=hard`;
        })
        const offset=document.querySelector('#offset');
        offset.addEventListener('input',()=>{
            let val=offset.value;
            if(val>500)offset.value=500;
            if(val<-500)offset.value=-500;
        })
    </script>
</body>
</html>
